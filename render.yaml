services:
  - type: web
    name: activity-hub
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    port: 10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: activity-hub-db
          property: connectionString

databases:
  - name: activity-hub-db
    plan: free
    region: singapore
